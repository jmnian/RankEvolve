task:
  seed: tests/fixtures/evolution_algo_seed.py
  evaluator: tests/fixtures/evolution_algo_evaluator.py

evolution:
  max_iterations: 24
  random_seed: 42
  capture_replay: true

search:
  algorithm: map_elites_islands
  population_size: 9
  archive_size: 6
  num_islands: 3
  migration_interval: 4
  migration_rate: 0.34
  feature_dimensions:
    - complexity
    - diversity
  feature_bins: 3

proposer:
  kind: scripted
  proposals_jsonl: tests/fixtures/evolution_algo_proposals.jsonl
  timeout: 30
  retries: 0

prompt:
  diff_based: true
  num_top_programs: 2
  num_diverse_programs: 2
  include_artifacts: true
  system_message: |
    You are testing the evolution framework. Produce only SEARCH/REPLACE edits.
    The evaluator reads SCORE, COMPLEXITY, and DIVERSITY constants from the program.

evaluation:
  timeout: 30
  isolation: inline
  cascade: false

trace:
  enabled: true
  include_prompts: true

logging:
  level: DEBUG
  debug_log: true

run_store:
  backend: sqlite
  vacuum_on_close: false