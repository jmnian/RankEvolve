# Late-interaction evolution over the curated OBLIQ-Bench + BRIGHT-Pro suite.
#
# Before a serious run, generate the exact-MaxSim latency baseline on this host:
#   uv run python -m tasks.late_interaction.run_new_benchmark_baseline --suite curated

task:
  seed: tasks/late_interaction/seeds/freeform.py
  evaluator: tasks/late_interaction/evaluator.py

evolution:
  max_iterations: 100
  random_seed: 42
  capture_replay: true
  capture_replay_every: 1

search:
  algorithm: map_elites_islands
  population_size: 30
  archive_size: 12
  num_islands: 3
  migration_interval: 8
  migration_rate: 0.15
  exploration_ratio: 0.30
  exploitation_ratio: 0.60
  feature_dimensions: [complexity, diversity]
  feature_bins: 4
  num_inspirations: 8
  complexity_metric: ast_nodes
  complexity_binning: adaptive_percentile
  failure_buffer_size: 12

proposer:
  kind: openai_responses
  models:
    - {name: "gpt-5.2", weight: 1.0}
  api_base: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  max_tokens: 32768
  reasoning_effort: medium
  timeout: 300
  retries: 3
  candidate_retries: 3

prompt:
  diff_based: true
  num_recent_programs: 1
  num_top_programs: 1
  num_diverse_programs: 5
  num_failed_attempts: 3
  max_diff_lines: 0
  summary_metric_keys:
    - combined_score
    - objective_recall_component
    - objective_ndcg_component
    - objective_latency_component
  summary_per_dataset_suffixes:
    - _recall_at_25
    - _ndcg_at_25
    - _alpha_ndcg_at_25
    - _aspect_recall_at_25
    - _query_latency_median_ms
  include_artifacts: true
  system_message: |
    You are inventing a late-interaction retrieval algorithm over fixed
    contextualized token embeddings. The seed is exact ColBERT MaxSim:
    score(q, d) = sum_i max_j q_i dot d_j. You may not retrain or re-encode
    embeddings; your only lever is the retrieval algorithm.

    The curated suite mixes OBLIQ-Bench, where latent relevance is the first-stage
    bottleneck, with BRIGHT-Pro, where complementary reasoning-aspect coverage is
    rewarded by alpha-nDCG and weighted aspect recall. Improve latency without
    collapsing quality on any dataset.

evaluation:
  timeout: 1800
  isolation: inline
  cascade: false
  env:
    EVAL_DEVICE: cpu
    EVAL_DATASETS: bright_pro_economics,bright_pro_stackoverflow,bright_pro_earth_science,obliq_twitter,obliq_congress
    EVAL_SAMPLE_QUERIES: "1000000000"
    EVAL_WARMUP_QUERIES: "10"
    EVAL_TIMED_REPEATS: "1"
    EVAL_RECALL_K: "25"
    EVAL_NDCG_K: "25"
    EVAL_QRELS_MODE: gold
    EVAL_AUTO_CACHE: "1"
    EVAL_PROGRESS: "1"

objective:
  name: new_benchmarks_alpha_ndcg25_latency
  recall_k: 25
  ndcg_k: 25
  recall_metric_key: aspect_recall_at_25
  ndcg_metric_key: alpha_ndcg_at_25
  metric_key_fallback: true
  weights:
    recall: 0.30
    ndcg: 0.40
    latency: 0.30
  latency:
    enabled: true
    baseline_source: external
    baseline_path: tasks/late_interaction/baselines/exact_maxsim.lightonai_lateon.new_benchmarks_curated.gold.${EVAL_DEVICE}.json
    warmup_queries: 10
    timed_repeats: 1
    hard_slowdown_threshold: 8.0
    penalty_mode: zero_latency_score
  aggregation:
    mode: geometric
    eps: 0.001
  min_recall: 0.01
